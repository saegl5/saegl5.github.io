
<html>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; }
  h1 { font-size: 28px; font-weight: 800; text-align: center; color: #222; margin: 0 0 1.5rem 0; letter-spacing: -0.5px; }
  .problem-set { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .problem-card { background: #ffffff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .problem-container { width: fit-content; margin-left: auto; }
  .box {
    display: inline-block; width: 24px; height: 24px; padding: 0;
    border: 1px dashed #aaa; border-radius: 4px;
    font-size: 14px; font-weight: 600; font-family: monospace;
    text-align: center; background: #f9f9f9; color: #333; vertical-align: middle;
  }
  .box-wide {
    display: inline-block; width: 48px; height: 24px; padding: 0;
    border: 1px dashed #aaa; border-radius: 4px;
    font-size: 14px; font-weight: 600; font-family: monospace;
    text-align: center; background: #f9f9f9; color: #333; vertical-align: middle;
  }
  .box:focus, .box-wide:focus { outline: 0; border-style: solid; border-color: #555; }
  .box:disabled, .box-wide:disabled { background: #eee; color: #bbb; border-color: #ddd; cursor: not-allowed; }
  .correct-box   { border-style: solid !important; border-color: #2a9d5c !important; background: #d4f5e2 !important; color: #1a6e3f !important; }
  .incorrect-box { border-style: solid !important; border-color: #e05c5c !important; background: #fde8e8 !important; color: #a33 !important; }
  .prow { display: flex; align-items: center; justify-content: flex-end; font-size: 22px; font-weight: 600; font-family: monospace; line-height: 32px; }
  .prow .op { width: 24px; flex-shrink: 0; }
  .prow .s  { display: inline-flex; align-items: center; justify-content: center; width: 40px; flex-shrink: 0; }
  .prow .sw { display: inline-flex; align-items: center; justify-content: center; width: 56px; flex-shrink: 0; }
  .divider { border: none; border-top: 2px solid #333; margin: 4px 0; }
  .steps { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
  .step-row {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
    background: #f0f0f0; border-radius: 8px; padding: 6px 10px;
    transition: opacity 0.3s;
    opacity: 0.3;
  }
  .step-row.active { opacity: 1; }
  .step-label { font-weight: 600; width: 72px; flex-shrink: 0; color: #555; }
  .step-eq { color: #555; flex: 1; }
  .step-result { font-weight: 600; font-family: monospace; min-width: 28px; text-align: right; color: #333; }
  button { padding: 8px 16px; border: 1px solid #ccc; background: #fff; border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.15s; color: #333; }
  button:hover { background: #f0f0f0; }
  button:active { transform: scale(0.98); }
</style>

<div style="padding:1rem 0">
  <h1>Triple Digit Addition Practice</h1>
  <div id="problems" class="problem-set"></div>
  <button onclick="generateProblems()">New problems</button>
</div>

<script>
const problems = [];
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function digs(n){return{h:Math.floor(n/100),t:Math.floor(n/10)%10,o:n%10};}

function applyTradeColor(el, val, expected) {
  el.classList.remove('correct-box','incorrect-box');
  if (expected > 0) {
    if (val === '' || parseInt(val) === 0) el.classList.add('incorrect-box');
    else el.classList.add(parseInt(val) === expected ? 'correct-box' : 'incorrect-box');
  } else {
    if (val === '' || parseInt(val) === 0) el.classList.add('correct-box');
    else el.classList.add('incorrect-box');
  }
}

function setupTradeBox(trEl, expected, nextEl) {
  let advanced = false;
  function advance() {
    if (!advanced) {
      advanced = true;
      nextEl.disabled = false;
      nextEl.focus();
    }
  }
  trEl.addEventListener('input', () => {
    const val = trEl.value;
    if (val !== '') { applyTradeColor(trEl, val, expected); advance(); }
    else { trEl.classList.remove('correct-box','incorrect-box'); advanced = false; }
  });
  trEl.addEventListener('blur', () => {
    const val = trEl.value;
    if (val === '') applyTradeColor(trEl, val, expected);
    advance();
  });
}

function guideText(a, b, extra, sum) {
  const total = a + b + extra;
  const trade = Math.floor(total / 10);
  const leave = total % 10;
  let eq = `${a}+${b}`;
  if (extra) eq += `+${extra}`;
  eq += ` = ${total}`;
  if (trade) eq += ` → trade ${trade}, leave ${leave}`;
  return eq;
}

function generateProblems(){
  problems.length=0;
  document.getElementById('problems').innerHTML='';

  for(let i=0;i<4;i++){
    const num1=randInt(100,999);
    const two=i%2!==0;
    const num2=two?randInt(10,99):randInt(100,999);
    const d1=digs(num1),d2=digs(num2);
    const correct=num1+num2,cd=digs(correct);
    const onesSum=d1.o+d2.o,onesTrade=Math.floor(onesSum/10);
    const tensSum=d1.t+d2.t+onesTrade,tensTrade=Math.floor(tensSum/10);
    const hundredsSum=d1.h+d2.h+tensTrade;
    problems.push({num1,num2,correct,cd,d1,d2,onesSum,onesTrade,tensSum,tensTrade,hundredsSum});

    const onesGuide    = guideText(d1.o, d2.o, 0, onesSum);
    const tensGuide    = guideText(d1.t, d2.t, onesTrade, tensSum);
    const hundredsGuide= guideText(d1.h, d2.h, tensTrade, hundredsSum);

    const card=document.createElement('div');
    card.className='problem-card';
    card.innerHTML=`
      <div class="problem-container">
        <div class="prow">
          <span class="op"></span><span class="sw"></span>
          <span class="s"><input class="box" id="tr-h-${i}" maxlength="1" inputmode="numeric" disabled></span>
          <span class="s"><input class="box" id="tr-t-${i}" maxlength="1" inputmode="numeric" disabled></span>
          <span class="s"></span>
        </div>
        <div class="prow">
          <span class="op"></span><span class="sw"></span>
          <span class="s">${d1.h}</span><span class="s">${d1.t}</span><span class="s">${d1.o}</span>
        </div>
        <div class="prow">
          <span class="op">+</span>
          ${two
            ?`<span class="sw"></span><span class="s"></span><span class="s">${d2.t}</span><span class="s">${d2.o}</span>`
            :`<span class="sw"></span><span class="s">${d2.h}</span><span class="s">${d2.t}</span><span class="s">${d2.o}</span>`}
        </div>
        <hr class="divider">
        <div class="prow">
          <span class="op"></span>
          <span class="sw"><input class="box-wide" id="ah-${i}" maxlength="2" inputmode="numeric" disabled></span>
          <span class="s"><input class="box" id="at-${i}" maxlength="1" inputmode="numeric" disabled></span>
          <span class="s"><input class="box" id="ao-${i}" maxlength="1" inputmode="numeric"></span>
        </div>
      </div>
      <div class="steps">
        <div class="step-row active" id="row-o-${i}">
          <span class="step-label">Ones</span>
          <span class="step-eq">${onesGuide}</span>
        </div>
        <div class="step-row" id="row-t-${i}">
          <span class="step-label">Tens</span>
          <span class="step-eq">${tensGuide}</span>
        </div>
        <div class="step-row" id="row-h-${i}">
          <span class="step-label">Hundreds</span>
          <span class="step-eq">${hundredsGuide}</span>
        </div>
      </div>
    `;
    document.getElementById('problems').appendChild(card);

    const p=problems[i];
    const ao  = document.getElementById(`ao-${i}`);
    const trt = document.getElementById(`tr-t-${i}`);
    const at_ = document.getElementById(`at-${i}`);
    const trh = document.getElementById(`tr-h-${i}`);
    const ah  = document.getElementById(`ah-${i}`);
    const rowO = document.getElementById(`row-o-${i}`);
    const rowT = document.getElementById(`row-t-${i}`);
    const rowH = document.getElementById(`row-h-${i}`);

    function updateAns(el, val, expected){
      el.classList.remove('correct-box','incorrect-box');
      if(val==='') return;
      el.classList.add(parseInt(val)===expected ? 'correct-box' : 'incorrect-box');
    }

    // Step 1: ones answer → activate ones guide, unlock trade-tens
    ao.addEventListener('input', () => {
      updateAns(ao, ao.value, p.cd.o);
      if (ao.value.length === 1) { trt.disabled = false; trt.focus(); }
    });

    // Step 2: trade-tens → unlock tens answer, activate tens guide
    setupTradeBox(trt, p.onesTrade, {
      disabled: false,
      focus: () => { at_.disabled = false; rowT.classList.add('active'); at_.focus(); }
    });
    // override setupTradeBox — redo with inline to get guide activation
    // (reset and redo properly below)

    document.getElementById('problems').lastChild; // just a no-op to keep flow

    ao.removeEventListener('input', ao._handler);

    // redo everything cleanly with guide activation built in
    function wire() {
      let trtAdvanced = false;
      let trhAdvanced = false;

      ao.addEventListener('input', () => {
        updateAns(ao, ao.value, p.cd.o);
        if (ao.value.length === 1 && !trtAdvanced) {
          trt.disabled = false; trt.focus();
        }
      });

      function tradeFocus(trEl, expected, nextEl, nextRow, advancedFlag, setAdvanced) {
        trEl.addEventListener('input', () => {
          const val = trEl.value;
          if (val !== '') {
            applyTradeColor(trEl, val, expected);
            if (!advancedFlag()) {
              setAdvanced();
              nextEl.disabled = false;
              nextRow.classList.add('active');
              nextEl.focus();
            }
          } else {
            trEl.classList.remove('correct-box','incorrect-box');
          }
        });
        trEl.addEventListener('blur', () => {
          const val = trEl.value;
          if (val === '') applyTradeColor(trEl, val, expected);
          if (!advancedFlag()) {
            setAdvanced();
            nextEl.disabled = false;
            nextRow.classList.add('active');
            nextEl.focus();
          }
        });
      }

      tradeFocus(trt, p.onesTrade, at_, rowT, ()=>trtAdvanced, ()=>{ trtAdvanced=true; });

      at_.addEventListener('input', () => {
        updateAns(at_, at_.value, p.cd.t);
        if (at_.value.length === 1 && !trhAdvanced) {
          trh.disabled = false; trh.focus();
        }
      });

      tradeFocus(trh, p.tensTrade, ah, rowH, ()=>trhAdvanced, ()=>{ trhAdvanced=true; });

      ah.addEventListener('input', () => {
        updateAns(ah, ah.value, p.hundredsSum);
      });
    }

    wire();
  }
}
generateProblems();
</script>
</html>
