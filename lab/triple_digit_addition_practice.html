
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    min-height: 100vh;
    padding: 32px 20px;
    color: #1a1a1a;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.3px; }
  .subtitle { font-size: 15px; color: #444; margin-bottom: 24px; }
  .problem-set { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 340px), 1fr)); gap: 16px; margin-bottom: 20px; }
  .problem-card { background: #fff; border-radius: 12px; padding: 28px; border: 1.5px solid #e0e0d8; min-width: 0; overflow: hidden; }
  .problem-scroll { overflow-x: auto; overflow-y: visible; }
  .problem-container { width: fit-content; margin-left: auto; font-family: monospace; }
  .box {
    display: inline-block; width: 50px; height: 50px; padding: 0;
    border: 1.5px dashed #ccc; border-radius: 6px;
    font-size: 34px; font-weight: 600; font-family: monospace;
    text-align: center; background: #fafaf8; color: #1a1a1a;
    vertical-align: middle; line-height: 50px;
  }
  .box:focus { outline: 0; border-style: solid; border-color: #888; }
  .box:disabled { background: #eee; color: #bbb; border-color: #ddd; cursor: not-allowed; }
  .correct-box   { border-style: solid !important; border-color: #28a745 !important; background: #d4edda !important; color: #155724 !important; }
  .incorrect-box { border-style: solid !important; border-color: #dc3545 !important; background: #f8d7da !important; color: #721c24 !important; }
  .prow { display: flex; align-items: center; justify-content: flex-end; font-size: 34px; font-weight: 600; font-family: monospace; line-height: 55px; }
  .prow .op { width: 38px; flex-shrink: 0; }
  .prow .s  { display: inline-flex; align-items: center; justify-content: center; width: 62px; flex-shrink: 0; }
  .divider { border: none; border-top: 2px solid #1a1a1a; margin: 4px 0; }
  .card-feedback { height: 56px; display: flex; align-items: center; justify-content: center; margin-top: 12px; }
  @keyframes jiggle {
    0%   { transform: rotate(0deg); }
    15%  { transform: rotate(-8deg); }
    30%  { transform: rotate(8deg); }
    45%  { transform: rotate(-6deg); }
    60%  { transform: rotate(6deg); }
    75%  { transform: rotate(-3deg); }
    90%  { transform: rotate(3deg); }
    100% { transform: rotate(0deg); }
  }
  .feedback-content { display: inline-flex; align-items: center; gap: 6px; font-size: 34px; font-weight: 600; color: #28a745; animation: jiggle 0.6s ease; }
  .steps { display: none; flex-direction: column; gap: 6px; margin-top: 14px; }
  .steps.visible { display: flex; }
  .step-row { display: flex; align-items: center; gap: 8px; font-size: 20px; background: #f5f5f0; border-radius: 8px; padding: 8px 14px; transition: opacity 0.3s; opacity: 0.3; }
  .step-row.active { opacity: 1; }
  .step-label { font-weight: 600; width: 112px; flex-shrink: 0; color: #555; }
  .step-eq { color: #444; flex: 1; }
  .btn-help { width: 100%; margin-top: 16px; padding: 14px; background: #d6f0e0; border: none; border-radius: 10px; font-size: 15px; font-family: inherit; color: #1a7a45; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-help:hover { background: #c0e8d0; }
  .actions { margin-bottom: 20px; }
  .btn-next { padding: 14px 28px; background: #d6e4f7; border: none; border-radius: 10px; font-size: 15px; font-family: inherit; color: #1a6bb5; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn-next:hover { background: #c2d8f0; }
  .score-bar { background: #fff; border: 1.5px solid #e0e0d8; border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; font-size: 14px; color: #333; }
  .score-label { font-weight: 500; }
</style>
</head>
<body>
<div class="container">
  <h1>Triple Digit Addition Practice</h1>
  <p class="subtitle">Instructions: Enter each digit of your answer right to left, and trade when necessary.</p>
  <div id="problems" class="problem-set"></div>
  <div class="actions"><button class="btn-next" onclick="generateProblems()">Next Problems</button></div>
  <div class="score-bar"><span class="score-label">Score: <span id="scoreDisplay">0 / 0</span></span></div>
</div>

<script>
let scoreCorrect = 0, scoreTotal = 0;
const problems = [];

function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function digs(n){return{th:Math.floor(n/1000),h:Math.floor(n/100)%10,t:Math.floor(n/10)%10,o:n%10};}

// Select all text when a box is focused (single click)
function selectOnFocus(el) {
  el.addEventListener('focus', () => setTimeout(() => el.select(), 0));
}

function applyTradeColor(el, val, expected) {
  el.classList.remove('correct-box','incorrect-box');
  if (expected > 0) {
    if (val === '' || parseInt(val) === 0) el.classList.add('incorrect-box');
    else el.classList.add(parseInt(val) === expected ? 'correct-box' : 'incorrect-box');
  } else {
    if (val === '' || parseInt(val) === 0) el.classList.add('correct-box');
    else el.classList.add('incorrect-box');
  }
}

function guideText(a, aPresent, b, bPresent, carriedIn, userVal) {
  const total = carriedIn + a + b;
  const trade = Math.floor(total / 10);
  const leave = total % 10;
  const terms = [];
  if (carriedIn === 0) {
    if (userVal !== undefined && userVal !== '') terms.push(parseInt(userVal));
  } else {
    terms.push(carriedIn);
  }
  if (aPresent) terms.push(a);
  if (bPresent) terms.push(b);
  const prefix = terms.length > 0 ? terms.join('+') : String(total);
  let eq = prefix + ` = ${total}`;
  if (trade) eq += ` → leave ${leave}, trade ${trade}`;
  return eq;
}

function tradeFocusFn(trEl, expected, nextEl, onUpdate) {
  selectOnFocus(trEl);
  let nextUnlocked = false;
  function unlockNext() {
    if (!nextUnlocked) { nextUnlocked = true; nextEl.disabled = false; }
    nextEl.focus();
  }
  trEl.addEventListener('input', () => {
    const val = trEl.value;
    if (val !== '') { applyTradeColor(trEl, val, expected); unlockNext(); }
    else { trEl.classList.remove('correct-box','incorrect-box'); }
    if (onUpdate) onUpdate(val);
    checkAndScore(trEl._problemIdx);
  });
  trEl.addEventListener('blur', () => {
    const val = trEl.value;
    if (val === '') {
      applyTradeColor(trEl, val, expected);
      if (expected === 0) unlockNext();
    }
    if (onUpdate) onUpdate(val);
    checkAndScore(trEl._problemIdx);
  });
}

function updateAns(el, val, expected) {
  el.classList.remove('correct-box','incorrect-box');
  if (val === '') return;
  el.classList.add(parseInt(val) === expected ? 'correct-box' : 'incorrect-box');
}

function checkAnswerBoxes(i) {
  const p = problems[i];
  const ids = p.hasThousands ? [`ao-${i}`,`at-${i}`,`ah-${i}`,`ath-${i}`] : [`ao-${i}`,`at-${i}`,`ah-${i}`];
  let allFilled = true, allCorrect = true;
  for (const id of ids) {
    const el = document.getElementById(id);
    if (!el || el.value === '') allFilled = false;
    if (!el || !el.classList.contains('correct-box')) allCorrect = false;
  }
  return { allFilled, allCorrect };
}

function showCorrect(fb) {
  fb.innerHTML = '';
  const span = document.createElement('span');
  span.className = 'feedback-content';
  span.innerHTML = '👍 Correct!';
  fb.appendChild(span);
}

function checkAndScore(i) {
  const state = problems[i];
  const { allFilled, allCorrect } = checkAnswerBoxes(i);
  const fb = document.getElementById(`fb-${i}`);
  if (!allFilled) return;
  if (allCorrect) {
    if (!state.scored) {
      state.scored = true;
      if (state.countedWrong) { scoreCorrect++; }
      else { scoreTotal++; scoreCorrect++; }
      document.getElementById('scoreDisplay').textContent = scoreCorrect + ' / ' + scoreTotal;
    }
    showCorrect(fb);
  } else {
    fb.innerHTML = '';
    if (!state.countedWrong && !state.scored) {
      state.countedWrong = true;
      scoreTotal++;
      document.getElementById('scoreDisplay').textContent = scoreCorrect + ' / ' + scoreTotal;
    }
  }
}

function generateProblems() {
  problems.length = 0;
  document.getElementById('problems').innerHTML = '';

  for (let i = 0; i < 4; i++) {
    const num1 = randInt(100,999);
    const two = i % 2 !== 0;
    const num2 = two ? randInt(10,99) : randInt(100,999);
    const d1 = digs(num1), d2 = digs(num2);
    const ans = num1 + num2;
    const cd = digs(ans);
    const onesSum = d1.o+d2.o, onesTrade = Math.floor(onesSum/10);
    const tensSum = d1.t+d2.t+onesTrade, tensTrade = Math.floor(tensSum/10);
    const hundredsSum = d1.h+d2.h+tensTrade, hundredsTrade = Math.floor(hundredsSum/10);
    const hasThousands = ans >= 1000;
    const d2hPresent = !two;
    problems.push({num1,num2,ans,cd,d1,d2,onesSum,onesTrade,tensSum,tensTrade,hundredsSum,hundredsTrade,hasThousands,d2hPresent,scored:false,countedWrong:false});

    const thCol    = hasThousands ? `<span class="s"><input class="box" id="tr-th-${i}" maxlength="1" inputmode="numeric" disabled></span>` : `<span class="s"></span>`;
    const thAnsCol = hasThousands ? `<span class="s"><input class="box" id="ath-${i}" maxlength="1" inputmode="numeric" disabled></span>` : `<span class="s"></span>`;

    const card = document.createElement('div');
    card.className = 'problem-card';
    card.innerHTML = `
      <div class="problem-scroll">
        <div class="problem-container">
          <div class="prow">
            <span class="op"></span>${thCol}
            <span class="s"><input class="box" id="tr-h-${i}" maxlength="1" inputmode="numeric" disabled></span>
            <span class="s"><input class="box" id="tr-t-${i}" maxlength="1" inputmode="numeric" disabled></span>
            <span class="s"></span>
          </div>
          <div class="prow">
            <span class="op"></span><span class="s"></span>
            <span class="s">${d1.h}</span><span class="s">${d1.t}</span><span class="s">${d1.o}</span>
          </div>
          <div class="prow">
            <span class="op">+</span>
            ${two ? `<span class="s"></span><span class="s"></span><span class="s">${d2.t}</span><span class="s">${d2.o}</span>`
                  : `<span class="s"></span><span class="s">${d2.h}</span><span class="s">${d2.t}</span><span class="s">${d2.o}</span>`}
          </div>
          <hr class="divider">
          <div class="prow">
            <span class="op"></span>${thAnsCol}
            <span class="s"><input class="box" id="ah-${i}" maxlength="1" inputmode="numeric" disabled></span>
            <span class="s"><input class="box" id="at-${i}" maxlength="1" inputmode="numeric" disabled></span>
            <span class="s"><input class="box" id="ao-${i}" maxlength="1" inputmode="numeric"></span>
          </div>
        </div>
      </div>
      <div class="card-feedback" id="fb-${i}"></div>
      <button class="btn-help" id="help-btn-${i}" onclick="toggleHelp(${i})">Show Help</button>
      <div class="steps" id="steps-${i}">
        <div class="step-row active" id="row-o-${i}">
          <span class="step-label">Ones</span>
          <span class="step-eq" id="eq-o-${i}">${guideText(d1.o, true, d2.o, true, 0, undefined)}</span>
        </div>
        <div class="step-row" id="row-t-${i}">
          <span class="step-label">Tens</span>
          <span class="step-eq" id="eq-t-${i}">${guideText(d1.t, true, d2.t, true, onesTrade, undefined)}</span>
        </div>
        <div class="step-row" id="row-h-${i}">
          <span class="step-label">Hundreds</span>
          <span class="step-eq" id="eq-h-${i}">${guideText(d1.h, true, d2.h, d2hPresent, tensTrade, undefined)}</span>
        </div>
        ${hasThousands ? `<div class="step-row" id="row-th-${i}"><span class="step-label">Thousands</span><span class="step-eq" id="eq-th-${i}">${guideText(0, false, 0, false, hundredsTrade, undefined)}</span></div>` : ''}
      </div>
    `;
    document.getElementById('problems').appendChild(card);

    const p = problems[i];
    const ao  = document.getElementById(`ao-${i}`);
    const trt = document.getElementById(`tr-t-${i}`);
    const at_ = document.getElementById(`at-${i}`);
    const trh = document.getElementById(`tr-h-${i}`);
    const ah  = document.getElementById(`ah-${i}`);
    const rowO = document.getElementById(`row-o-${i}`);
    const rowT = document.getElementById(`row-t-${i}`);
    const rowH = document.getElementById(`row-h-${i}`);
    const eqT  = document.getElementById(`eq-t-${i}`);
    const eqH  = document.getElementById(`eq-h-${i}`);
    const allRows = [rowO, rowT, rowH];

    trt._problemIdx = i; trh._problemIdx = i;

    // Wire select-on-focus for all answer boxes
    [ao, at_, ah].forEach(selectOnFocus);

    let trth, ath, rowTh, eqTh;
    if (p.hasThousands) {
      trth = document.getElementById(`tr-th-${i}`);
      ath  = document.getElementById(`ath-${i}`);
      rowTh = document.getElementById(`row-th-${i}`);
      eqTh  = document.getElementById(`eq-th-${i}`);
      allRows.push(rowTh);
      trth._problemIdx = i;
      selectOnFocus(ath);
    }

    function setActive(row) { allRows.forEach(r => r.classList.remove('active')); row.classList.add('active'); }

    function wireAns(el, expected, rowEl, onFilled) {
      el.addEventListener('focus', () => setActive(rowEl));
      el.addEventListener('input', () => {
        updateAns(el, el.value, expected);
        checkAndScore(i);
        if (el.value.length === 1 && onFilled) onFilled();
      });
    }

    tradeFocusFn(trt, p.onesTrade, at_, (val) => {
      eqT.textContent = guideText(p.d1.t, true, p.d2.t, true, p.onesTrade, p.onesTrade === 0 ? val : undefined);
    });
    tradeFocusFn(trh, p.tensTrade, ah, (val) => {
      eqH.textContent = guideText(p.d1.h, true, p.d2.h, p.d2hPresent, p.tensTrade, p.tensTrade === 0 ? val : undefined);
    });

    wireAns(ao,  p.cd.o, rowO, () => { trt.disabled = false; trt.focus(); });
    wireAns(at_, p.cd.t, rowT, () => { trh.disabled = false; trh.focus(); });

    if (p.hasThousands) {
      tradeFocusFn(trth, p.hundredsTrade, ath, (val) => {
        eqTh.textContent = guideText(0, false, 0, false, p.hundredsTrade, p.hundredsTrade === 0 ? val : undefined);
      });
      wireAns(ah,  p.cd.h,  rowH,  () => { trth.disabled = false; trth.focus(); });
      wireAns(ath, p.cd.th, rowTh, null);
    } else {
      wireAns(ah, p.cd.h, rowH, null);
    }
  }
}

function toggleHelp(i) {
  const steps = document.getElementById(`steps-${i}`);
  const btn   = document.getElementById(`help-btn-${i}`);
  const visible = steps.classList.toggle('visible');
  btn.textContent = visible ? 'Hide Help' : 'Show Help';
}

generateProblems();
</script>
</body>
</html>
