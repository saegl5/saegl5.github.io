
<html>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; }
  .problem-set { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
  .problem-card { background: #ffffff; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .problem-container { width: fit-content; margin-left: auto; }

  .box, .box-wide {
    display: inline-block;
    height: 24px;
    padding: 0;
    border: 1px dashed #aaa;
    border-radius: 4px;
    font-size: 12px;
    font-family: monospace;
    text-align: center;
    background: #f9f9f9;
    color: #333;
    vertical-align: middle;
  }
  .box      { width: 24px; }
  .box-wide { width: 48px; }
  .box:focus, .box-wide:focus { outline: 0; border-style: solid; border-color: #555; }
  .correct-box   { border-style: solid !important; border-color: #2a9d5c !important; background: #d4f5e2 !important; color: #1a6e3f !important; }
  .incorrect-box { border-style: solid !important; border-color: #e05c5c !important; background: #fde8e8 !important; color: #a33 !important; }

  .prow {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    font-size: 22px;
    font-weight: 600;
    font-family: monospace;
    line-height: 32px;
  }
  .prow .op { width: 24px; flex-shrink: 0; font-size: 22px; }
  .prow .s  { display: inline-flex; align-items: center; justify-content: center; width: 40px; flex-shrink: 0; }
  .prow .sw { display: inline-flex; align-items: center; justify-content: center; width: 56px; flex-shrink: 0; }

  .divider { border: none; border-top: 2px solid #333; margin: 4px 0; }

  .steps { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
  .step-row { display: flex; align-items: center; gap: 8px; font-size: 13px; background: #f0f0f0; border-radius: 8px; padding: 6px 10px; transition: background 0.15s; }
  .step-row.correct   { background: #d4f5e2; color: #1a6e3f; }
  .step-row.incorrect { background: #fde8e8; color: #a33; }
  .step-label { font-weight: 600; width: 72px; flex-shrink: 0; color: #555; }
  .step-row.correct   .step-label, .step-row.correct   .step-eq, .step-row.correct   .step-result { color: #1a6e3f; }
  .step-row.incorrect .step-label, .step-row.incorrect .step-eq, .step-row.incorrect .step-result { color: #a33; }
  .step-eq { color: #555; flex: 1; }
  .step-result { font-weight: 600; font-family: monospace; min-width: 28px; text-align: right; }

  label { font-size: 14px; color: #555; display: block; margin-bottom: 8px; }
  input[type=range] { width: 100%; margin-bottom: 1.5rem; }

  button { padding: 8px 16px; border: 1px solid #ccc; background: #fff; border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.15s; color: #333; }
  button:hover { background: #f0f0f0; }
  button:active { transform: scale(0.98); }
</style>

<div style="padding:1rem 0">
  <label>Number of problems</label>
  <input type="range" id="numProblems" min="1" max="6" value="3">
  <div id="problems" class="problem-set"></div>
  <button onclick="generateProblems()">New problems</button>
</div>

<script>
const problems = [];
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function digs(n){return{h:Math.floor(n/100),t:Math.floor(n/10)%10,o:n%10};}

function generateProblems(){
  const n=parseInt(document.getElementById('numProblems').value);
  problems.length=0;
  document.getElementById('problems').innerHTML='';

  for(let i=0;i<n;i++){
    const num1=randInt(100,999);
    const two=i%2!==0;
    const num2=two?randInt(10,99):randInt(100,999);
    const d1=digs(num1),d2=digs(num2);
    const correct=num1+num2,cd=digs(correct);
    const onesSum=d1.o+d2.o,onesTrade=Math.floor(onesSum/10);
    const tensSum=d1.t+d2.t+onesTrade,tensTrade=Math.floor(tensSum/10);
    const hundredsSum=d1.h+d2.h+tensTrade;
    problems.push({num1,num2,correct,cd,d1,d2,onesSum,onesTrade,tensSum,tensTrade,hundredsSum});

    const card=document.createElement('div');
    card.className='problem-card';
    card.innerHTML=`
      <div class="problem-container">
        <div class="prow">
          <span class="op"></span>
          <span class="sw"></span>
          <span class="s"><input class="box" id="tr-h-${i}" maxlength="1" inputmode="numeric"></span>
          <span class="s"><input class="box" id="tr-t-${i}" maxlength="1" inputmode="numeric"></span>
          <span class="s"></span>
        </div>
        <div class="prow">
          <span class="op"></span>
          <span class="sw"></span>
          <span class="s">${d1.h}</span><span class="s">${d1.t}</span><span class="s">${d1.o}</span>
        </div>
        <div class="prow">
          <span class="op">+</span>
          ${two
            ?`<span class="sw"></span><span class="s"></span><span class="s">${d2.t}</span><span class="s">${d2.o}</span>`
            :`<span class="sw"></span><span class="s">${d2.h}</span><span class="s">${d2.t}</span><span class="s">${d2.o}</span>`}
        </div>
        <hr class="divider">
        <div class="prow">
          <span class="op"></span>
          <span class="sw"><input class="box-wide" id="ah-${i}" maxlength="2" inputmode="numeric"></span>
          <span class="s"><input class="box" id="at-${i}" maxlength="1" inputmode="numeric"></span>
          <span class="s"><input class="box" id="ao-${i}" maxlength="1" inputmode="numeric"></span>
        </div>
      </div>

      <div class="steps">
        <div class="step-row" id="row-o-${i}">
          <span class="step-label">Ones</span>
          <span class="step-eq">${d1.o}+${d2.o}${onesTrade?' → trade '+onesTrade:''}</span>
          <span class="step-result" id="sr-o-${i}">—</span>
        </div>
        <div class="step-row" id="row-t-${i}">
          <span class="step-label">Tens</span>
          <span class="step-eq">${d1.t}+${d2.t}${onesTrade?'+'+onesTrade:''}${tensTrade?' → trade '+tensTrade:''}</span>
          <span class="step-result" id="sr-t-${i}">—</span>
        </div>
        <div class="step-row" id="row-h-${i}">
          <span class="step-label">Hundreds</span>
          <span class="step-eq">${d1.h}+${d2.h}${tensTrade?'+'+tensTrade:''}</span>
          <span class="step-result" id="sr-h-${i}">—</span>
        </div>
      </div>
    `;
    document.getElementById('problems').appendChild(card);

    const p=problems[i];

    function checkBox(el,val,expected){
      el.classList.remove('correct-box','incorrect-box');
      if(val==='') return;
      el.classList.add(parseInt(val)===expected?'correct-box':'incorrect-box');
    }
    function updateAns(el,srEl,rowEl,val,expected){
      el.classList.remove('correct-box','incorrect-box');
      srEl.textContent='—'; rowEl.classList.remove('correct','incorrect');
      if(val==='') return;
      const ok=parseInt(val)===expected;
      el.classList.add(ok?'correct-box':'incorrect-box');
      srEl.textContent=val; rowEl.classList.add(ok?'correct':'incorrect');
    }
    function onAns(col){
      const ao=document.getElementById(`ao-${i}`);
      const at=document.getElementById(`at-${i}`);
      const ah=document.getElementById(`ah-${i}`);
      updateAns(ao,document.getElementById(`sr-o-${i}`),document.getElementById(`row-o-${i}`),ao.value,p.cd.o);
      updateAns(at,document.getElementById(`sr-t-${i}`),document.getElementById(`row-t-${i}`),at.value,p.cd.t);
      updateAns(ah,document.getElementById(`sr-h-${i}`),document.getElementById(`row-h-${i}`),ah.value,p.hundredsSum);
      if(col==='o'&&ao.value.length===1) at.focus();
      if(col==='t'&&at.value.length===1) ah.focus();
    }
    document.getElementById(`ao-${i}`).addEventListener('input',()=>onAns('o'));
    document.getElementById(`at-${i}`).addEventListener('input',()=>onAns('t'));
    document.getElementById(`ah-${i}`).addEventListener('input',()=>onAns('h'));
    document.getElementById(`tr-t-${i}`).addEventListener('input',e=>checkBox(e.target,e.target.value,p.onesTrade));
    document.getElementById(`tr-h-${i}`).addEventListener('input',e=>checkBox(e.target,e.target.value,p.tensTrade));
  }
}
generateProblems();
</script>
</html>
